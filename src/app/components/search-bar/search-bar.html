<div class="search-wrapper">
  <div class="search-container-wrap">
    <div class="search-container">
      <span class="search-icon">
        <img src="/assets/jeepney_icon.png" alt="jeepney" width="28" height="24" style="object-fit: contain;">
      </span>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        placeholder="Search terminals, routes, or destinations..."
        (input)="onInput()"
        (keydown)="onKeyDown($event)"
        (blur)="hideSuggestions()"
        autocomplete="off"
      />
      <button (click)="onSearch()">Search</button>
    </div>

    @if (showSuggestions) {
      <ul class="suggestions-list">
        @for (s of suggestions; track s.label; let i = $index) {
          <li
            class="suggestion-item"
            [class.active]="i === activeIndex"
            (mousedown)="selectSuggestion(s)"
            (mouseover)="activeIndex = i"
          >
            <span class="suggestion-icon">
              <img src="/assets/jeepney_icon.png" alt="jeepney" width="18" height="15" style="object-fit: contain; opacity: 0.5;">
            </span>
            <span class="suggestion-label">{{ s.label }}</span>
            <span class="suggestion-sub">{{ s.sublabel }}</span>
          </li>
        }
      </ul>
    }
  </div>

  <div class="search-tags">
    <span>Quick search:</span>
    <button class="tag" (click)="quickSearch('Session-Harrison')">Session-Harrison</button>
    <button class="tag" (click)="quickSearch('Igorot Park')">Igorot Park</button>
    <button class="tag" (click)="quickSearch('Rizal Park')">Rizal Park</button>
    <button class="tag" (click)="quickSearch('Baguio Public Market')">Public Market</button>
    <button class="tag" (click)="quickSearch('Malcolm Square')">Malcolm Square</button>
    <button class="tag" (click)="quickSearch('Center Mall')">Center Mall</button>
    <button class="tag" (click)="quickSearch('Magsaysay Ave')">Magsaysay Ave</button>
  </div>
</div>
